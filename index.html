<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Little Hands Art School</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <div class="d-flex align-items-center my-4"> 
            <!-- d-fex activates flexbox so it stays on the same line -->
            <!-- align-items-center ensure the logo and title are certically aligned to each other -->
            <!-- my-4 adds vertical margin to separate the header from the task list -->
            <img src="images/kidsart-logo.png" style="height: 60px;" class="me-3">
            <h1 class="mb-0">Little Hands Art School Task Tracker </h1>
        </div>

        <!-- Task items will be inserted here -->
        <ul class="list-group bg-transparent" id="tasklist">

        </ul>







    </main>
    <!-- load scripts -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
