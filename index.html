<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Little Hands Art School Task Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <div class="d-flex align-items-center my-4">
            <!-- d-fex activates flexbox so it stays on the same line -->
            <!-- align-items-center ensure the logo and title are certically aligned to each other -->
            <!-- my-4 adds vertical margin to separate the header from the task list -->
            <img src="images/kidsart-logo.png" alt="Little Hands Art School Logo" class="logo-image">
            <h1 class="mb-0">Little Hands Art School Task Tracker </h1>
        </div>

        <!-- Add Task Button -->
        <div class="mb-4">
            <button id="addTaskBtn" class="btn btn-primary shadow-sm">
                + Add New Task
            </button>
        </div>


        <!-- Task items will be inserted here -->
        <div class="table-responsive shadow-sm rounded">
            <ul class="list-group bg-transparent" id="tasklist" style="min-width: 800px">

            </ul>
        </div>

    </main>

    <!-- axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- load scripts -->
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
